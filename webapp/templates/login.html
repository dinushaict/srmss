{% extends "base.html" %}
{% block title %}Sign in — SRMSS{% endblock %}
{% block body %}
<div style="min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px;">
  <div class="card" style="width:400px; max-width:100%;">
    <div style="border-bottom:4px solid var(--amber); padding-bottom:14px; margin-bottom:20px;">
      <div style="font-family:'Familjen Grotesk',sans-serif; font-weight:700; font-size:24px; letter-spacing:1px;">SRMSS</div>
      <div class="mono" style="color:var(--muted); font-size:11px; letter-spacing:2px; text-transform:uppercase;">Smart Route Management &amp; Scheduling</div>
    </div>
    <h1 style="font-size:20px; margin-bottom:18px;">Depot sign in</h1>
    {% if error %}<div class="flash err">{{ error }}</div>{% endif %}
    <form method="post" action="{{ url_for('login') }}">
      <div style="margin-bottom:14px;">
        <label>Username</label>
        <input name="username" autofocus style="width:100%;">
      </div>
      <div style="margin-bottom:18px;">
        <label>Password</label>
        <input name="password" type="password" style="width:100%;">
      </div>
      <button class="btn" type="submit" style="width:100%;">Sign in</button>
    </form>
    <div class="mono" style="margin-top:18px; padding-top:14px; border-top:1px dashed var(--line); font-size:12px; color:var(--muted);">
      Demo logins:<br>
      admin / depot123 &nbsp;·&nbsp; supervisor / super123 &nbsp;·&nbsp; clerk / clerk123
    </div>
  </div>
</div>
{% endblock %}
